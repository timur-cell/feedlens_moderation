# When a TLS-terminating proxy (Caddy/Traefik) sits in front, pass its
# X-Forwarded-Proto through; otherwise fall back to our own scheme. Rails'
# CSRF origin check needs the original scheme or logins fail with 422.
map $http_x_forwarded_proto $forwarded_proto {
  default $http_x_forwarded_proto;
  ""      $scheme;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 25m;

  # Rails API (session cookies stay same-origin)
  location /api {
    proxy_pass http://web:80;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_read_timeout 300s;
  }

  location /image-proxy {
    proxy_pass http://web:80;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
  }

  # Rails health check passthrough
  location /up {
    proxy_pass http://web:80;
    proxy_set_header Host $http_host;
  }

  # SPA fallback
  location / {
    try_files $uri /index.html;
  }
}
